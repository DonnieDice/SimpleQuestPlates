name: Package and Release

on:
  push:
    tags:
      - 'v*'

env:
  CF_API_KEY: ${{ secrets.CF_API_KEY }}
  WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}
  GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clone Project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git user
        run: |
          git config --global user.name "donniedice"
          git config --global user.email "donniedice@protonmail.com"

      - name: Set Release Type
        id: set_release_type
        run: |
          TAG_NAME="${{ github.ref }}"
          if [[ "$TAG_NAME" == *"beta"* ]]; then
            echo "release_type=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG_NAME" == *"alpha"* ]]; then
            echo "release_type=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "release_type=release" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Version from TOC
        id: extract_version
        run: |
          if [ -f "SimpleQuestPlates.toc" ]; then
            version=$(grep -E "^## Version:" SimpleQuestPlates.toc | awk '{print $3}')
            if [ -z "$version" ]; then
              version="${{ github.ref_name }}"
            fi
          else
            version="${{ github.ref_name }}"
          fi
          echo "Extracted version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Extract Changes
        id: extract_changelog
        run: |
          if [ -f "docs/CHANGES.md" ]; then
            echo "changelog_file=docs/CHANGES.md" >> "$GITHUB_OUTPUT"
          else
            echo "No changelog available" > /tmp/sqp_changes.md
            echo "changelog_file=/tmp/sqp_changes.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Package and Release
        uses: BigWigsMods/packager@master
        with:
          release-type: ${{ steps.set_release_type.outputs.release_type }}

      - name: Send Discord Notification
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "Discord webhook not configured, skipping notification"
            exit 0
          fi

          RELEASE_TYPE="${{ steps.set_release_type.outputs.release_type }}"
          if [ "$RELEASE_TYPE" = "alpha" ]; then
            RELEASE_LABEL="ALPHA"
            COLOR=16711680
          elif [ "$RELEASE_TYPE" = "beta" ]; then
            RELEASE_LABEL="BETA"
            COLOR=16744448
          else
            RELEASE_LABEL="RELEASE"
            COLOR=5820057
          fi

          VERSION="${{ steps.extract_version.outputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.ref_name }}"
          fi

          JSON_PAYLOAD=$(jq -n \
            --arg release_label "$RELEASE_LABEL" \
            --arg version "$VERSION" \
            --arg tag "${{ github.ref_name }}" \
            --rawfile changelog "${{ steps.extract_changelog.outputs.changelog_file }}" \
            --argjson color "$COLOR" \
            '{
              "content": "",
              "username": "SQP Release",
              "avatar_url": "https://raw.githubusercontent.com/donniedice/SimpleQuestPlates/main/images/logo.png",
              "embeds": [{
                "title": "[\($release_label)] SQP | Simple Quest Plates - \($version)",
                "description": "**See quest progress at a glance!** A new version of SQP has been released!\n\n**Whats New:**\n\($changelog)\n\n**Display quest objective progress directly on enemy nameplates!**",
                "url": "https://github.com/donniedice/SimpleQuestPlates/releases/tag/\($tag)",
                "color": $color,
                "thumbnail": {
                  "url": "https://raw.githubusercontent.com/donniedice/SimpleQuestPlates/main/images/logo.png"
                },
                "fields": [
                  {
                    "name": "Downloads",
                    "value": "[CurseForge](https://www.curseforge.com/wow/addons/simple-quest-plates)\n[WoWInterface](https://www.wowinterface.com/downloads/info26957)\n[GitHub](https://github.com/donniedice/SimpleQuestPlates)",
                    "inline": true
                  },
                  {
                    "name": "Compatibility",
                    "value": "- Midnight\n- Classic Era\n- TBC Anniversary\n- MoP Classic",
                    "inline": true
                  },
                  {
                    "name": "Support",
                    "value": "[Join Discord](https://discord.gg/rgxmods)\n[Report Issues](https://github.com/donniedice/SimpleQuestPlates/issues)",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "RGX Mods - RealmGX Community",
                  "icon_url": "https://raw.githubusercontent.com/donniedice/SimpleQuestPlates/main/images/kiwi.gif"
                },
                "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'"
              }]
            }')

          echo "Sending Discord notification..."
          echo "Version: $VERSION"

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$JSON_PAYLOAD" \
               "$DISCORD_WEBHOOK"

      - name: Send Discord Failure Notification
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "Discord webhook not configured, skipping notification"
            exit 0
          fi

          VERSION="${{ steps.extract_version.outputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="Unknown"
          fi

          JSON_PAYLOAD=$(jq -n \
            --arg version "$VERSION" \
            --arg run_id "${{ github.run_id }}" \
            '{
              "content": "",
              "username": "SQP Build Failed",
              "avatar_url": "https://raw.githubusercontent.com/donniedice/SimpleQuestPlates/main/images/logo.png",
              "embeds": [{
                "title": "SQP Build Failed",
                "description": "The release workflow encountered an error",
                "url": "https://github.com/donniedice/SimpleQuestPlates/actions/runs/\($run_id)",
                "color": 15158332,
                "fields": [
                  {
                    "name": "Version",
                    "value": $version,
                    "inline": true
                  },
                  {
                    "name": "Workflow",
                    "value": "[View Logs](https://github.com/donniedice/SimpleQuestPlates/actions/runs/\($run_id))",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "RGX Mods - Build System",
                  "icon_url": "https://raw.githubusercontent.com/donniedice/SimpleQuestPlates/main/images/kiwi.gif"
                },
                "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'"
              }]
            }')

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$JSON_PAYLOAD" \
               "$DISCORD_WEBHOOK"
